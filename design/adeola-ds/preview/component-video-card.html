<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
  .thumb { position: relative; aspect-ratio: 16/9; background: rgba(255,255,255,0.08); overflow: hidden; }
  .play-btn {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  }
  .play-circle {
    width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
  }
  .card:hover .thumb { opacity: 0.7; }
  .card:hover .play-circle { background: rgba(255,255,255,0.22); }
  .thumb { transition: opacity 0.3s; }
  .card-title { font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; color: #fff; text-transform: uppercase; }
  .card-sub { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
  .thumb-img { width:100%; height:100%; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(14,39,149,0.5) 100%); }
</style></head>
<body>
<div class="grid">
  <div class="card">
    <div class="thumb">
      <img src="../assets/video-thumbnail.png" style="width:100%;height:100%;object-fit:cover;display:block;">
      <div class="play-btn"><div class="play-circle"><svg width="12" height="14" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="white"/></svg></div></div>
    </div>
    <div class="card-title">Music Video Title</div>
    <div class="card-sub">Director · January 2026</div>
  </div>
  <div class="card">
    <div class="thumb">
      <div class="thumb-img" style="background: linear-gradient(135deg, rgba(255,206,229,0.1) 0%, rgba(14,39,149,0.5) 100%)"></div>
      <div class="play-btn"><div class="play-circle"><svg width="12" height="14" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="white"/></svg></div></div>
    </div>
    <div class="card-title">Another Video</div>
    <div class="card-sub">Director · March 2025</div>
  </div>
</div>
</body></html>
