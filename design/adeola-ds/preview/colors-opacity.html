<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 20px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; border-radius: 4px; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .name { font-size: 9px; letter-spacing: 0.06em; color: #fff; text-transform: uppercase; }
  .val  { font-size: 11px; color: #fff; font-weight: bold; }
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:rgba(255,255,255,0.70)"><div class="name" style="color:#000">white/70</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.60)"><div class="name" style="color:#000">white/60</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.50)"><div class="name" style="color:#000">white/50</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.40)"><div class="name">white/40</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.30)"><div class="name">white/30</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.20)"><div class="name">white/20</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.10)"><div class="name">white/10</div></div>
  <div class="swatch" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1)"><div class="name">white/05</div></div>
</div>
</body></html>
