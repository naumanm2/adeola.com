<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #1a1a2e; font-family: Helvetica, Arial, sans-serif; padding: 20px; }
  .row { display: flex; gap: 12px; }
  .swatch { flex: 1; border-radius: 6px; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .name { font-size: 10px; letter-spacing: 0.08em; color: #fff; opacity: 0.7; text-transform: uppercase; }
  .hex  { font-size: 12px; letter-spacing: 0.04em; color: #fff; font-weight: bold; }
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:#0e2795; border: 1px solid rgba(255,255,255,0.15)">
    <div class="name">Brand Blue</div><div class="hex">#0e2795</div>
  </div>
  <div class="swatch" style="background:#002f6d; border: 1px solid rgba(255,255,255,0.15)">
    <div class="name">Dark Blue</div><div class="hex">#002f6d</div>
  </div>
  <div class="swatch" style="background:#161616">
    <div class="name">Button</div><div class="hex">#161616</div>
  </div>
  <div class="swatch" style="background:#ffffff">
    <div class="name" style="color:#0e2795; opacity:1">White</div><div class="hex" style="color:#0e2795">#ffffff</div>
  </div>
  <div class="swatch" style="background:#ededed">
    <div class="name" style="color:#0e2795; opacity:1">Off White</div><div class="hex" style="color:#0e2795">#ededed</div>
  </div>
</div>
</body></html>
