<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 20px; }
  .tracks { display: flex; flex-direction: column; }
  .track { display: flex; flex-direction: column; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 0; }
  .top { display: flex; gap: 20px; align-items: flex-start; }
  .cover { width: 72px; height: 72px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
  .info { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }
  .track-title { font-weight: 500; font-size: 1rem; color: #fff; }
  .track-sub { font-size: 0.875rem; color: rgba(255,255,255,0.5); }
  .player { width: 100%; height: 32px; background: rgba(255,255,255,0.05); border-radius: 4px; display: flex; align-items: center; padding: 0 12px; box-sizing: border-box; gap: 10px; }
  .play-sm { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 9px; }
  .progress-fill { width: 35%; height: 100%; background: rgba(255,255,255,0.6); border-radius: 9px; }
  .time { font-size: 10px; color: rgba(255,255,255,0.4); }
</style></head>
<body>
<div class="tracks">
  <div class="track">
    <div class="top">
      <div class="cover" style="overflow:hidden;position:relative"><img src="../assets/video-thumbnail.png" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div class="info">
        <div class="track-title">Track Title</div>
        <div class="track-sub">EP Name · 2025</div>
      </div>
    </div>
    <div class="player">
      <div class="play-sm"><svg width="7" height="8" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="white"/></svg></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="time">1:24 / 3:47</div>
    </div>
  </div>
  <div class="track">
    <div class="top">
      <div class="cover" style="background:rgba(255,206,229,0.08)"></div>
      <div class="info">
        <div class="track-title">Another Track</div>
        <div class="track-sub">Single · 2024</div>
      </div>
    </div>
    <div class="player">
      <div class="play-sm"><svg width="7" height="8" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="white"/></svg></div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      <div class="time">0:00 / 4:12</div>
    </div>
  </div>
</div>
</body></html>
