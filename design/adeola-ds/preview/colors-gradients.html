<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 20px; }
  .row { display: flex; flex-direction: column; gap: 16px; }
  .item { display: flex; align-items: center; gap: 16px; }
  .label { font-size: 10px; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); text-transform: uppercase; width: 120px; flex-shrink: 0; }
  .sample { font-size: 28px; font-weight: bold; letter-spacing: 0.05em; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
</style></head>
<body>
<div class="row">
  <div class="item">
    <div class="label">Pink → Blue<br><span style="font-size:9px; opacity:0.6">Bio quote</span></div>
    <div class="sample" style="background-image: linear-gradient(180deg, #ffcee5 0%, #ffcee5 50%, #002f6d 100%)">ADEOLA IKUESAN</div>
  </div>
  <div class="item">
    <div class="label">Gold<br><span style="font-size:9px; opacity:0.6">Show count</span></div>
    <div class="sample" style="background-image: linear-gradient(207deg, rgb(255,212,133) 6%, rgb(249,192,88) 88%)">(12)</div>
  </div>
  <div class="item">
    <div class="label">White Fade<br><span style="font-size:9px; opacity:0.6">About text</span></div>
    <div class="sample" style="background-image: linear-gradient(180deg, #f6f6f6 0%, rgba(246,246,246,0) 100%)">Singer · Songwriter</div>
  </div>
</div>
</body></html>
