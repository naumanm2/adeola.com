<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 16px 20px; }
  .rows { display: flex; flex-direction: column; }
  .row { display: flex; align-items: center; gap: 24px; border-top: 1px solid rgba(255,255,255,0.2); padding: 16px 12px; }
  .title { flex: 1; font-weight: 700; font-size: 1.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; line-height: 1.1; }
  .meta { flex: 1; display: flex; align-items: center; gap: 12px; }
  .info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .location { font-size: 1rem; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; }
  .date { font-size: 1rem; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: #161616; border: 0.4px solid rgba(246,246,246,0.4);
    border-radius: 9999px; padding: 6px 14px 6px 6px;
    color: #fff; font-size: 0.875rem;
  }
  .cta-icon { width: 28px; height: 28px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; }
  .faded { opacity: 0.5; }
</style></head>
<body>
<div class="rows">
  <div class="row">
    <div class="title">Venue Name</div>
    <div class="meta">
      <div class="info">
        <div class="location">London, UK</div>
        <div class="date">15/06/2026 20:00</div>
      </div>
      <div class="cta">
        <div class="cta-icon"><svg width="8" height="9" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="#161616"/></svg></div>
        Tickets
      </div>
    </div>
  </div>
  <div class="row">
    <div class="title">Another Show</div>
    <div class="meta">
      <div class="info">
        <div class="location">Lagos, NG</div>
        <div class="date">22/07/2026 21:00</div>
      </div>
      <div class="cta">
        <div class="cta-icon"><svg width="8" height="9" viewBox="0 0 8 9" fill="none"><path d="M8 4.5L0 9L0 0L8 4.5Z" fill="#161616"/></svg></div>
        Tickets
      </div>
    </div>
  </div>
  <div class="row faded">
    <div class="title">Past Show</div>
    <div class="meta">
      <div class="info">
        <div class="location">Manchester, UK</div>
        <div class="date">10/03/2025 19:30</div>
      </div>
    </div>
  </div>
</div>
</body></html>
