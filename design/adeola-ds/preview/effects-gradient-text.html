<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; background: #0e2795; font-family: Helvetica, Arial, sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .block { display: flex; flex-direction: column; gap: 4px; }
  .meta { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
  .grad { font-weight: 500; font-size: 1.4rem; letter-spacing: 0.025em; line-height: 1.4; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .blend { mix-blend-mode: lighten; background: rgba(255,255,255,0.12); height: 80px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: rgba(255,255,255,0.5); font-style: italic; }
</style></head>
<body>
  <div class="block">
    <div class="meta">Bio Quote — Pink → Blue gradient</div>
    <div class="grad" style="background-image: linear-gradient(180deg, #ffcee5 0%, #ffcee5 50%, #002f6d 100%)">Singer-songwriter weaving warm R&B textures with raw, honest emotion and a sound entirely her own.</div>
  </div>
  <div class="block">
    <div class="meta">Show Count — Gold gradient</div>
    <div class="grad" style="background-image: linear-gradient(207deg, rgb(255,212,133) 6%, rgb(249,192,88) 88%); font-size: 2rem; font-weight: 700;">(12)</div>
  </div>
  <div class="block">
    <div class="meta">Ghost / mix-blend-lighten — Hero image effect</div>
    <div class="blend">image rendered with mix-blend-mode: lighten onto #0e2795 background</div>
  </div>
</body></html>
